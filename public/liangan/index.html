<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《一路》连杆联动模拟器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
        }
        .control-panel {
            background: #34495e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .levers-container {
            display: flex;
            gap: 40px;
            margin: 30px 0;
            justify-content: center;
        }
        .lever-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .track {
            width: 20px;
            height: 150px;
            background: #1a252f;
            border-radius: 10px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .handle {
            width: 40px;
            height: 20px;
            background: #e74c3c;
            border-radius: 5px;
            position: absolute;
            left: -10px;
            transition: top 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        /* 档位视觉标识：1档top: 10px, 2档top: 65px, 3档top: 120px */
        .handle.pos-1 { top: 10px; }
        .handle.pos-2 { top: 65px; }
        .handle.pos-3 { top: 120px; }
        
        .handle-A { background-color: #3498db; }
        .handle-B { background-color: #2ecc71; }
        .handle-C { background-color: #f1c40f; }

        .btn {
            background: #7f8c8d;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #95a5a6; }
        .btn:active { background: #bdc3c7; }
        
        .status {
            margin-top: 20px;
            font-size: 1.2em;
            font-family: monospace;
            background: #1a252f;
            padding: 10px;
            border-radius: 8px;
        }
        
        .go-btn {
            margin-top: 20px;
            background: #c0392b;
            font-size: 1.5em;
            padding: 15px 40px;
            border-radius: 50px;
            border: 4px solid #e74c3c;
            color: white;
            font-weight: 900;
            opacity: 0.5;
            cursor: not-allowed;
            transition: all 0.3s;
        }
        .go-btn.active {
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 0 20px #e74c3c;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <h2>《一路》连杆联动模拟器</h2>
    <p>目标：A=1, B=2, C=3</p>
    
    <div class="levers-container">
        <div class="lever-group">
            <button class="btn" onclick="moveLever('A', -1)">▲ 上推</button>
            <div class="track">
                <div id="handle-A" class="handle handle-A pos-2"></div>
            </div>
            <button class="btn" onclick="moveLever('A', 1)">▼ 下拉</button>
            <strong>A</strong>
        </div>
        <div class="lever-group">
            <button class="btn" onclick="moveLever('B', -1)">▲ 上推</button>
            <div class="track">
                <div id="handle-B" class="handle handle-B pos-2"></div>
            </div>
            <button class="btn" onclick="moveLever('B', 1)">▼ 下拉</button>
            <strong>B</strong>
        </div>
        <div class="lever-group">
            <button class="btn" onclick="moveLever('C', -1)">▲ 上推</button>
            <div class="track">
                <div id="handle-C" class="handle handle-C pos-2"></div>
            </div>
            <button class="btn" onclick="moveLever('C', 1)">▼ 下拉</button>
            <strong>C</strong>
        </div>
    </div>

    <div class="status" id="status-text">当前状态: A=2, B=2, C=3</div>
    
    <button id="go-btn" class="go-btn" onclick="checkWin()">GO</button>
</div>

<script>
    // 初始化状态 (1=上, 2=中, 3=下)
    // 故意设置一个需要操作的初始状态
    let state = { A: 2, B: 2, C: 2 };

    function clamp(val) {
        return Math.max(1, Math.min(3, val));
    }

    function moveLever(target, direction) {
        // direction: -1 为上推(数值减小)，1 为下拉(数值增加)
        let oldTargetPos = state[target];
        let newTargetPos = clamp(state[target] + direction);
        
        // 如果主动杆已经到底/到顶，推不动，则直接返回，不触发联动
        if (oldTargetPos === newTargetPos) return; 

        state[target] = newTargetPos;

        // 处理联动逻辑 (基于打滑机制：clamp函数确保超限时停留在1或3)
        if (target === 'A') {
            // A动，B反向
            state.B = clamp(state.B - direction);
        } else if (target === 'C') {
            // C动，B同向
            state.B = clamp(state.B + direction);
        } else if (target === 'B') {
            // B动，A、C反向
            state.A = clamp(state.A - direction);
            state.C = clamp(state.C - direction);
        }

        updateUI();
    }

    function updateUI() {
        document.getElementById('handle-A').className = `handle handle-A pos-${state.A}`;
        document.getElementById('handle-B').className = `handle handle-B pos-${state.B}`;
        document.getElementById('handle-C').className = `handle handle-C pos-${state.C}`;
        
        document.getElementById('status-text').innerText = `当前状态: A=${state.A}, B=${state.B}, C=${state.C}`;

        // 检查胜利条件 A=1, B=2, C=3
        let goBtn = document.getElementById('go-btn');
        if (state.A === 1 && state.B === 2 && state.C === 3) {
            goBtn.classList.add('active');
        } else {
            goBtn.classList.remove('active');
        }
    }

    function checkWin() {
        if (state.A === 1 && state.B === 2 && state.C === 3) {
            alert("破解成功！锁已开启！");
        }
    }

    // 初始化渲染
    updateUI();
</script>
</body>
</html>
